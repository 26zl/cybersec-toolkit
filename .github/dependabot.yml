version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
    # codeql-action's init/analyze/upload-sarif must move together — separate PRs
    # per sub-action fail the version-consistency check. Group them into one PR.
    groups:
      codeql-action:
        patterns:
          - "github/codeql-action*"

  - package-ecosystem: "uv"
    directory: "/mcp_server"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    # Routine version bumps are handled by the uv-update workflow (weekly bulk
    # `uv lock --upgrade`); keep Dependabot here for security-advisory PRs only,
    # which this limit does not restrict, to avoid duplicate/conflicting lock PRs.
    open-pull-requests-limit: 0

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 3
    commit-message:
      prefix: "docker"
    labels:
      - "dependencies"
