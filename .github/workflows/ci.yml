name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run ShellCheck on all shell scripts
        run: |
          shopt -s globstar
          shellcheck --severity=warning \
            install.sh \
            lib/common.sh \
            lib/installers.sh \
            lib/shared.sh \
            modules/blockchain.sh \
            modules/blueteam.sh \
            modules/cloud.sh \
            modules/containers.sh \
            modules/crypto.sh \
            modules/enterprise.sh \
            modules/forensics.sh \
            modules/misc.sh \
            modules/mobile.sh \
            modules/networking.sh \
            modules/cracking.sh \
            modules/pwn.sh \
            modules/recon.sh \
            modules/reversing.sh \
            modules/stego.sh \
            modules/web.sh \
            modules/wireless.sh \
            modules/llm.sh \
            scripts/verify.sh \
            scripts/update.sh \
            scripts/remove.sh \
            scripts/backup.sh

  syntax-check:
    name: Bash Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check bash syntax on all shell scripts
        run: |
          exit_code=0
          for f in install.sh lib/*.sh modules/*.sh scripts/*.sh; do
            if ! bash -n "$f"; then
              echo "::error file=$f::Syntax error in $f"
              exit_code=1
            fi
          done
          exit $exit_code

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: DavidAnson/markdownlint-cli2-action@07035fd053f7be764496c0f8d8f9f41f98305101 # v22.0.0
        with:
          globs: |
            **/*.md
            !docs/TOOL_ANALYSIS.md
            !tests/bats/**/*.md
            !tests/test_helper/**/*.md
            !mcp_server/.venv/**/*.md

  tests:
    name: Tests (bats-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Run bats tests
        run: ./tests/bats/bin/bats tests/*.bats

  tools-config-validate:
    name: Validate tools_config.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cross-validate tools_config.json against module arrays
        run: python3 scripts/validate_tools_config.py

  mcp-server-check:
    name: MCP Server Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.1

      - name: Verify MCP server imports and tool count
        run: |
          cd mcp_server && uv sync --quiet
          uv run python -c "
          import sys; sys.path.insert(0, '..')
          from mcp_server.server import mcp, _db
          assert _db.total_tools > 500, f'Expected 500+ tools, got {_db.total_tools}'
          print(f'MCP server OK: {_db.total_tools} tools, {mcp.name}')
          "

      - name: Validate MCP data in sync with bash sources
        run: python3 scripts/validate_mcp_sync.py

  profile-validate:
    name: Validate Profiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate profile configs
        run: |
          # Extract valid modules dynamically from lib/common.sh (single source of truth)
          VALID_MODULES=$(grep '^ALL_MODULES=' lib/common.sh | sed 's/ALL_MODULES=(//' | sed 's/)//')
          exit_code=0

          for conf in profiles/*.conf; do
            profile_name="$(basename "$conf")"

            # Check MODULES variable exists
            if ! grep -q '^MODULES=' "$conf"; then
              echo "::error file=$conf::$profile_name: missing MODULES variable"
              exit_code=1
              continue
            fi

            # Extract module list
            modules_line=$(grep '^MODULES=' "$conf" | head -1)
            # Remove MODULES=" and trailing "
            modules_value=$(echo "$modules_line" | sed 's/^MODULES="//' | sed 's/"$//')

            # Validate each module name
            for mod in $modules_value; do
              found=0
              for valid in $VALID_MODULES; do
                if [[ "$mod" == "$valid" ]]; then
                  found=1
                  break
                fi
              done
              if [[ $found -eq 0 ]]; then
                echo "::error file=$conf::$profile_name: unknown module '$mod'"
                exit_code=1
              fi
            done

            echo "$profile_name: OK (modules: $modules_value)"
          done

          exit $exit_code
