name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run ShellCheck on all shell scripts
        run: shellcheck --severity=warning install.sh lib/*.sh modules/*.sh scripts/*.sh

  syntax-check:
    name: Bash Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check bash syntax on all shell scripts
        run: |
          exit_code=0
          for f in install.sh lib/*.sh modules/*.sh scripts/*.sh; do
            if ! bash -n "$f"; then
              echo "::error file=$f::Syntax error in $f"
              exit_code=1
            fi
          done
          exit $exit_code

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: |
            **/*.md
            !docs/TOOL_ANALYSIS.md
            !tests/bats/**/*.md
            !tests/test_helper/**/*.md
            !mcp_server/.venv/**/*.md
            !.claude/skills/**/*.md
            !.agents/skills/**/*.md

  tests:
    name: Tests (bats-core)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: Run bats tests
        run: ./tests/bats/bin/bats tests/*.bats

  tools-config-validate:
    name: Validate tools_config.json
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cross-validate tools_config.json against module arrays
        run: python3 scripts/validate_tools_config.py

  distro-compat-validate:
    name: Validate distro_compat.tsv
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate distro compatibility mappings
        run: python3 scripts/validate_distro_compat.py

  claude-skills-validate:
    name: Validate Claude Skills
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate Claude Code skill metadata
        run: python3 scripts/validate_claude_skills.py

      - name: Validate Claude Code skill optional dependencies
        run: python3 scripts/audit_skill_dependencies.py --check-declared

      - name: Validate vendored skill upstream pins are consistent
        run: bash scripts/update-skills.sh --check-pins

  python-lint:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Lint and format check
        run: |
          cd mcp_server && uv sync --group dev --quiet
          uv run ruff check .
          uv run ruff format --check .
          # Also lint the repo-root helper scripts (own ruff.toml at repo root).
          uv run ruff check ../scripts/

  python-tests:
    name: Python Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Run MCP server tests
        run: cd mcp_server && uv sync --group dev --quiet && uv run pytest tests/ -v

  mcp-server-check:
    name: MCP Server Import Check
    needs:
      - shellcheck
      - syntax-check
      - markdown-lint
      - tests
      - tools-config-validate
      - distro-compat-validate
      - claude-skills-validate
      - python-lint
      - python-tests
      - profile-validate
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Enforce all CI prerequisites
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failed=$(jq -r 'to_entries[] | select(.value.result != "success") | "\(.key)=\(.value.result)"' <<<"$NEEDS_JSON")
          if [[ -n "$failed" ]]; then
            echo "::error::Required CI jobs did not succeed:"
            echo "$failed"
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Verify MCP server imports and tool count
        run: |
          cd mcp_server && uv sync --quiet
          uv run python -c "
          import sys; sys.path.insert(0, '..')
          from mcp_server.server import mcp, _db
          assert _db.total_tools > 500, f'Expected 500+ tools, got {_db.total_tools}'
          print(f'MCP server OK: {_db.total_tools} tools, {mcp.name}')
          "

      - name: Verify cybersec-mcp console script
        run: |
          cd mcp_server && uv sync --no-editable --quiet
          uv run python - <<'PY'
          import subprocess
          import sys
          import time

          p = subprocess.Popen(
              ["cybersec-mcp"],
              stdin=subprocess.PIPE,
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE,
              text=True,
          )
          time.sleep(2)
          running = p.poll() is None
          if running:
              p.terminate()
          out, err = p.communicate(timeout=5)
          if not running or "Starting MCP server" not in err:
              sys.stderr.write(err)
              sys.exit(1)
          PY

      - name: Validate MCP data in sync with bash sources
        run: python3 scripts/validate_mcp_sync.py

  profile-validate:
    name: Validate Profiles
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate profile configs
        run: |
          # Extract valid modules dynamically from lib/common.sh (single source of truth)
          VALID_MODULES=$(grep '^ALL_MODULES=' lib/common.sh | sed 's/ALL_MODULES=(//' | sed 's/)//')
          exit_code=0

          for conf in profiles/*.conf; do
            profile_name="$(basename "$conf")"

            # Check MODULES variable exists
            if ! grep -q '^MODULES=' "$conf"; then
              echo "::error file=$conf::$profile_name: missing MODULES variable"
              exit_code=1
              continue
            fi

            # Extract module list
            modules_line=$(grep '^MODULES=' "$conf" | head -1)
            # Remove MODULES=" and trailing "
            modules_value=$(echo "$modules_line" | sed 's/^MODULES="//' | sed 's/"$//')

            # Validate each module name
            for mod in $modules_value; do
              found=0
              for valid in $VALID_MODULES; do
                if [[ "$mod" == "$valid" ]]; then
                  found=1
                  break
                fi
              done
              if [[ $found -eq 0 ]]; then
                echo "::error file=$conf::$profile_name: unknown module '$mod'"
                exit_code=1
              fi
            done

            echo "$profile_name: OK (modules: $modules_value)"
          done

          exit $exit_code
