name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck on all shell scripts
        run: |
          shopt -s globstar
          shellcheck --severity=warning \
            install.sh \
            lib/common.sh \
            lib/installers.sh \
            modules/ad.sh \
            modules/cloud.sh \
            modules/containers.sh \
            modules/crypto.sh \
            modules/forensics.sh \
            modules/malware.sh \
            modules/misc.sh \
            modules/networking.sh \
            modules/password.sh \
            modules/pwn.sh \
            modules/recon.sh \
            modules/reversing.sh \
            modules/stego.sh \
            modules/web.sh \
            modules/wireless.sh \
            scripts/verify.sh \
            scripts/update.sh \
            scripts/remove.sh \
            scripts/backup.sh

  syntax-check:
    name: Bash Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check bash syntax on all shell scripts
        run: |
          exit_code=0
          for f in install.sh lib/*.sh modules/*.sh scripts/*.sh; do
            if ! bash -n "$f"; then
              echo "::error file=$f::Syntax error in $f"
              exit_code=1
            fi
          done
          exit $exit_code

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !docs/TOOL_ANALYSIS.md

  json-validate:
    name: Validate tools_config.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: python3 -c "import json, sys; json.load(open('tools_config.json'))" || exit 1

      - name: Validate tool entries have required fields
        run: |
          python3 <<'PYEOF'
          import json, sys

          with open("tools_config.json") as f:
              data = json.load(f)

          errors = []
          modules = data.get("modules", {})

          if not modules:
              errors.append("No 'modules' key found at top level")

          valid_methods = {
              "apt", "pipx", "go", "cargo", "gem", "git",
              "binary", "docker", "special", "source", "snap"
          }

          for mod_name, mod_data in modules.items():
              # Each module has "description" and "tools" keys
              tools = mod_data.get("tools", {})
              if not tools and not isinstance(mod_data.get("description"), str):
                  errors.append(f"modules.{mod_name}: missing 'tools' dict")
                  continue

              for tool_name, tool_info in tools.items():
                  prefix = f"modules.{mod_name}.tools.{tool_name}"
                  if not isinstance(tool_info, dict):
                      errors.append(f"{prefix}: expected dict, got {type(tool_info).__name__}")
                      continue
                  if "description" not in tool_info:
                      errors.append(f"{prefix}: missing 'description'")
                  if "install_method" not in tool_info:
                      errors.append(f"{prefix}: missing 'install_method'")
                  elif tool_info["install_method"] not in valid_methods:
                      errors.append(
                          f"{prefix}: invalid install_method "
                          f"'{tool_info['install_method']}'"
                      )

          if errors:
              for e in errors:
                  print(f"::error::{e}")
              sys.exit(1)

          total = sum(len(m.get("tools", {})) for m in modules.values())
          print(f"Validated {total} tools across {len(modules)} modules")
          PYEOF

  profile-validate:
    name: Validate Profiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate profile configs
        run: |
          VALID_MODULES="misc networking recon web crypto pwn reversing forensics malware ad wireless password stego cloud containers"
          exit_code=0

          for conf in profiles/*.conf; do
            profile_name="$(basename "$conf")"

            # Check MODULES variable exists
            if ! grep -q '^MODULES=' "$conf"; then
              echo "::error file=$conf::$profile_name: missing MODULES variable"
              exit_code=1
              continue
            fi

            # Extract module list
            modules_line=$(grep '^MODULES=' "$conf" | head -1)
            # Remove MODULES=" and trailing "
            modules_value=$(echo "$modules_line" | sed 's/^MODULES="//' | sed 's/"$//')

            # Validate each module name
            for mod in $modules_value; do
              found=0
              for valid in $VALID_MODULES; do
                if [[ "$mod" == "$valid" ]]; then
                  found=1
                  break
                fi
              done
              if [[ $found -eq 0 ]]; then
                echo "::error file=$conf::$profile_name: unknown module '$mod'"
                exit_code=1
              fi
            done

            echo "$profile_name: OK (modules: $modules_value)"
          done

          exit $exit_code
