name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: ShellCheck
        run: |
          shopt -s globstar
          shellcheck --severity=warning \
            install.sh lib/*.sh modules/*.sh scripts/*.sh

      - name: Validate bash syntax
        run: |
          for f in install.sh lib/*.sh modules/*.sh scripts/*.sh; do
            bash -n "$f"
          done

      - name: Run bats tests
        run: ./tests/bats/bin/bats tests/*.bats

      - name: Validate tools_config.json
        run: python3 scripts/validate_tools_config.py

      - name: Validate profile configs
        run: |
          VALID_MODULES="misc networking recon web crypto pwn reversing forensics enterprise wireless cracking stego cloud containers blueteam mobile blockchain llm"
          exit_code=0
          for conf in profiles/*.conf; do
            profile_name="$(basename "$conf")"
            if ! grep -q '^MODULES=' "$conf"; then
              echo "::error file=$conf::$profile_name: missing MODULES variable"
              exit_code=1
              continue
            fi
            modules_line=$(grep '^MODULES=' "$conf" | head -1)
            modules_value=$(echo "$modules_line" | sed 's/^MODULES="//' | sed 's/"$//')
            for mod in $modules_value; do
              found=0
              for valid in $VALID_MODULES; do
                if [[ "$mod" == "$valid" ]]; then
                  found=1
                  break
                fi
              done
              if [[ $found -eq 0 ]]; then
                echo "::error file=$conf::$profile_name: unknown module '$mod'"
                exit_code=1
              fi
            done
            echo "$profile_name: OK (modules: $modules_value)"
          done
          exit $exit_code

  release:
    name: Create Release
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1 || echo "")
          CURRENT_TAG="${GITHUB_REF_NAME}"

          {
            echo "changelog<<CHANGELOG_EOF"
            if [[ -n "$PREV_TAG" && "$PREV_TAG" != "$CURRENT_TAG" ]]; then
              echo "## Changes since $PREV_TAG"
              echo ""
              git log "$PREV_TAG".."$CURRENT_TAG" --pretty=format:"- %s (%h)" --no-merges
            else
              echo "## Initial Release"
              echo ""
              git log --pretty=format:"- %s (%h)" --no-merges -20
            fi
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate verification summary
        run: |
          {
            echo "# Verification Summary"
            echo ""
            echo "## Modules"
            for mod in modules/*.sh; do
              name=$(basename "$mod" .sh)
              echo "- **$name**"
            done
            echo ""
            echo "## Profiles"
            for conf in profiles/*.conf; do
              name=$(basename "$conf" .conf)
              modules=$(grep '^MODULES=' "$conf" | sed 's/MODULES="//' | sed 's/"//')
              count=$(echo "$modules" | wc -w)
              echo "- **$name**: $count modules"
            done
            echo ""
            echo "## Install Methods"
            echo "apt, pipx, go install, cargo, gem, npm, git clone, binary release, Docker, snap, build-from-source"
          } > verification-summary.md

      - uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          body: |
            ${{ steps.changelog.outputs.changelog }}

            ---

            See [README.md](README.md) for installation instructions.
          files: verification-summary.md
          generate_release_notes: true
