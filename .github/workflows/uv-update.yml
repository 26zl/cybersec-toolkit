name: Update uv dependencies

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: read

jobs:
  uv-update:
    name: Bump uv packages
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.PAT_TOKEN }}
          persist-credentials: false

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Upgrade all packages in uv.lock
        id: upgrade
        run: |
          cd mcp_server
          cp uv.lock uv.lock.old
          uv lock --upgrade
          if diff -q uv.lock uv.lock.old > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dependency updates available."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            # Build a readable summary of what changed
            diff uv.lock.old uv.lock | grep '^[<>].*version' | head -30 > /tmp/diff_summary.txt || true
            {
              echo 'summary<<EOF'
              cat /tmp/diff_summary.txt
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi
          rm -f uv.lock.old

      - name: Verify MCP server still works
        if: steps.upgrade.outputs.changed == 'true'
        run: |
          cd mcp_server && uv sync --quiet
          uv run python -c "
          import sys; sys.path.insert(0, '..')
          from mcp_server.server import mcp, _db
          assert _db.total_tools > 500, f'Expected 500+ tools, got {_db.total_tools}'
          print(f'MCP server OK: {_db.total_tools} tools')
          "

      - name: Create pull request
        if: steps.upgrade.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "chore: bump uv dependencies"
          branch: auto/uv-update
          delete-branch: true
          title: "chore: bump uv dependencies"
          body: |
            Automated weekly dependency update for `mcp_server/uv.lock`.

            ```
            ${{ steps.upgrade.outputs.summary }}
            ```

            MCP server import test passed.
          labels: dependencies

      - name: Enable auto-merge
        if: steps.upgrade.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number != ''
        run: |
          gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}" || true
          # If this fails with "Auto merge is not allowed", enable it under
          # repo Settings → General → Pull Requests → Allow auto-merge
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
