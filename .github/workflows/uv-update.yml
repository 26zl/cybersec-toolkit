name: Update uv dependencies

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  uv-update:
    name: Bump uv packages
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # checkout v6 needs the token passed explicitly or its fetch fails with
          # "could not read Username for github.com" (git 2.54). See github/community
          # #183817. The PR push uses GITHUB_TOKEN (below), not this step.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Upgrade all packages in uv.lock
        id: upgrade
        run: |
          cd mcp_server
          cp uv.lock uv.lock.old
          # pyproject.toml sets [tool.uv] exclude-newer = "3 days" to avoid
          # locking package releases during their highest-risk window.
          uv lock --upgrade
          if diff -q uv.lock uv.lock.old > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dependency updates available."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            # Build a readable summary of what changed
            diff uv.lock.old uv.lock | grep '^[<>].*version' | head -30 > /tmp/diff_summary.txt || true
            {
              echo 'summary<<EOF'
              cat /tmp/diff_summary.txt
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi
          rm -f uv.lock.old

      - name: Verify upgraded lockfile (sync, import, lint, tests, audit, sync-check)
        id: verify
        if: steps.upgrade.outputs.changed == 'true'
        run: |
          # Exercise the upgraded uv.lock before it can auto-merge — GITHUB_TOKEN
          # PRs do not trigger ci.yml/security.yml, so run the gating checks here.
          cd mcp_server && uv sync --quiet
          uv run python -c "
          import sys; sys.path.insert(0, '..')
          from mcp_server.server import mcp, _db
          assert _db.total_tools > 500, f'Expected 500+ tools, got {_db.total_tools}'
          print(f'MCP server OK: {_db.total_tools} tools')
          "
          uv run --group dev ruff check .
          uv run --group dev ruff format --check .
          uv run --group dev python -m pytest tests/ -q
          uvx pip-audit
          cd ..
          python3 scripts/validate_mcp_sync.py

      - name: Create pull request
        if: success() && steps.upgrade.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump uv dependencies"
          branch: auto/uv-update
          delete-branch: true
          title: "chore: bump uv dependencies"
          body: |
            Automated weekly dependency update for `mcp_server/uv.lock`.

            ```
            ${{ steps.upgrade.outputs.summary }}
            ```

            Verified against the upgraded lock: `uv sync`, MCP import check, `ruff check`/`format --check`, `pytest`, `pip-audit`, and `validate_mcp_sync.py` all passed before auto-merge.
          labels: dependencies

      - name: Enable auto-merge
        # Only auto-merge when every prior step (including the verify gate above)
        # succeeded — the upgraded lock has now passed import/lint/tests/audit/sync.
        if: success() && steps.verify.outcome == 'success' && steps.upgrade.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number != ''
        run: |
          gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}" || true
          # If this fails with "Auto merge is not allowed", enable it under
          # repo Settings → General → Pull Requests → Allow auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
