name: Update uv dependencies

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  uv-update:
    name: Bump uv packages
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # Pinned to checkout v5 (NOT the v6 used elsewhere): v6 stores the token via
      # an `includeIf` credential file that create-pull-request hides but cannot
      # fully unwind, breaking its branch push under git 2.54 ("could not read
      # Username for github.com"). v5 persists a plain .git/config extraheader that
      # the push reuses. See peter-evans/create-pull-request#2682. Keep on v5 until
      # that interaction is fixed upstream (do not let Dependabot bump to v6).
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Upgrade all packages in uv.lock
        id: upgrade
        run: |
          cd mcp_server
          cp uv.lock uv.lock.old
          # pyproject.toml sets [tool.uv] exclude-newer = "3 days" to avoid
          # locking package releases during their highest-risk window.
          uv lock --upgrade
          if diff -q uv.lock uv.lock.old > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dependency updates available."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            # Build a readable summary of what changed
            diff uv.lock.old uv.lock | grep '^[<>].*version' | head -30 > /tmp/diff_summary.txt || true
            {
              echo 'summary<<EOF'
              cat /tmp/diff_summary.txt
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi
          rm -f uv.lock.old

      - name: Verify MCP server still works
        if: steps.upgrade.outputs.changed == 'true'
        run: |
          cd mcp_server && uv sync --quiet
          uv run python -c "
          import sys; sys.path.insert(0, '..')
          from mcp_server.server import mcp, _db
          assert _db.total_tools > 500, f'Expected 500+ tools, got {_db.total_tools}'
          print(f'MCP server OK: {_db.total_tools} tools')
          "

      - name: Create pull request
        if: steps.upgrade.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump uv dependencies"
          branch: auto/uv-update
          delete-branch: true
          title: "chore: bump uv dependencies"
          body: |
            Automated weekly dependency update for `mcp_server/uv.lock`.

            ```
            ${{ steps.upgrade.outputs.summary }}
            ```

            MCP server import test passed.
          labels: dependencies

      - name: Enable auto-merge
        if: steps.upgrade.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number != ''
        run: |
          gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}" || true
          # If this fails with "Auto merge is not allowed", enable it under
          # repo Settings → General → Pull Requests → Allow auto-merge
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
