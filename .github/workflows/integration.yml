name: Integration

on:
  push:
    branches: [main, master]
  pull_request:
    # Run on installer/Docker-touching PRs so breakage is caught pre-merge, not only weekly.
    paths:
      - "install.sh"
      - "lib/**"
      - "modules/**"
      - "profiles/**"
      - "scripts/**"
      - "Dockerfile"
      - ".dockerignore"
      - "tests/**"
      - ".github/workflows/integration.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"   # Weekly Sunday at 03:00 UTC

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: "${{ matrix.distro }} integration"
    runs-on: ubuntu-latest
    timeout-minutes: 40
    container:
      image: "${{ matrix.image }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            image: ubuntu:26.04
          - distro: fedora
            image: fedora:44
          - distro: arch
            image: archlinux:latest
          - distro: opensuse
            image: opensuse/tumbleweed:latest

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install prerequisites (Ubuntu)
        if: matrix.distro == 'ubuntu'
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git curl wget sudo ca-certificates

      - name: Install prerequisites (Fedora)
        if: matrix.distro == 'fedora'
        run: dnf install -y git curl wget sudo which

      - name: Install prerequisites (Arch)
        if: matrix.distro == 'arch'
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed git curl wget sudo which

      - name: Install prerequisites (openSUSE)
        if: matrix.distro == 'opensuse'
        run: |
          printf '%s\n' \
            'download.max_silent_tries = 10' \
            'download.transfer_timeout = 300' \
            'download.connect_timeout = 60' >> /etc/zypp/zypp.conf
          {
            echo "ZYPPER_REFRESH_ATTEMPTS=5"
            echo "ZYPPER_REFRESH_DELAY=20"
          } >> "$GITHUB_ENV"

          zypper_refresh() {
            attempt=1
            delay=15
            max_attempts=5
            while [ "$attempt" -le "$max_attempts" ]; do
              if zypper --non-interactive --gpg-auto-import-keys refresh --force; then
                return 0
              fi
              if [ "$attempt" -eq "$max_attempts" ]; then
                return 1
              fi
              echo "zypper refresh failed (attempt ${attempt}/${max_attempts}); cleaning metadata and retrying in ${delay}s" >&2
              zypper --non-interactive clean --all || true
              sleep "$delay"
              delay=$((delay * 2))
              attempt=$((attempt + 1))
            done
          }

          zypper_refresh
          zypper --non-interactive install git curl wget sudo which awk

      - name: Dry-run full profile
        run: bash install.sh --dry-run --profile full

      - name: Install networking subset
        run: |
          # Install a few fast, universally-available packages to test the real
          # install path including fixup_package_names and pkg_install.
          bash install.sh --tool nmap --tool curl --tool tcpdump --tool socat --tool whois
          # Show install log on failure for debugging
          if [ -f cybersec_install.log ]; then
            echo "=== Install log ==="
            cat cybersec_install.log
          fi

      - name: Verify installed tools
        run: |
          # Verify the specific tools we installed are present
          for tool in nmap curl tcpdump socat whois; do
            if command -v "$tool" >/dev/null 2>&1; then
              echo "OK: $tool"
            else
              echo "FAIL: $tool"
              exit 1
            fi
          done

      - name: Run verify script (smoke test)
        # Smoke test: verify.sh runs without crashing. Exit code reflects
        # missing tools (expected — we only installed 5 of 71).
        run: bash scripts/verify.sh --module networking --summary || true

      - name: Remove networking module
        run: bash scripts/remove.sh --module networking --yes

  method-canaries:
    name: "${{ matrix.method }} method canary"
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - method: pipx
            tool: factordb-python
            verify: factordb
          - method: go
            tool: anew
            verify: anew
          - method: binary
            tool: gitleaks
            verify: gitleaks
          - method: git
            tool: linux-smart-enumeration
            verify: /opt/linux-smart-enumeration
          - method: source
            tool: massdns
            verify: /opt/massdns/bin/massdns

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false

      - name: Install through the real single-tool path
        env:
          METHOD: ${{ matrix.method }}
          TOOL: ${{ matrix.tool }}
          # Authenticate GitHub API calls (raises rate limit 60→5000/hr).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          extra_args=()
          [[ "$METHOD" == "binary" ]] && extra_args+=(--production)
          sudo --preserve-env=GITHUB_TOKEN bash install.sh --tool "$TOOL" "${extra_args[@]}"

      - name: Verify canary result
        env:
          VERIFY: ${{ matrix.verify }}
        run: |
          if [[ "$VERIFY" == /* ]]; then
            test -e "$VERIFY"
          else
            command -v "$VERIFY"
          fi

  docker-build:
    name: Docker image build
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false

      - name: Build production image
        run: docker build --pull --tag cybersec-toolkit:ci .

      - name: Scan image for fixable HIGH/CRITICAL vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: cybersec-toolkit:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Verify default container command
        run: docker run --rm cybersec-toolkit:ci
