name: Integration

on:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  integration:
    name: "${{ matrix.distro }} integration"
    runs-on: ubuntu-latest
    container:
      image: "${{ matrix.image }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            image: ubuntu:24.04
          - distro: fedora
            image: fedora:41
          - distro: arch
            image: archlinux:latest
          - distro: opensuse
            image: opensuse/tumbleweed:latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install prerequisites (Ubuntu)
        if: matrix.distro == 'ubuntu'
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git curl wget sudo ca-certificates

      - name: Install prerequisites (Fedora)
        if: matrix.distro == 'fedora'
        run: dnf install -y git curl wget sudo which

      - name: Install prerequisites (Arch)
        if: matrix.distro == 'arch'
        run: pacman -Sy --noconfirm git curl wget sudo which

      - name: Install prerequisites (openSUSE)
        if: matrix.distro == 'opensuse'
        run: zypper --non-interactive install git curl wget sudo which

      - name: Bash syntax check
        run: |
          exit_code=0
          for f in install.sh lib/*.sh modules/*.sh scripts/*.sh; do
            if ! bash -n "$f"; then
              echo "::error file=$f::Syntax error in $f"
              exit_code=1
            fi
          done
          exit $exit_code

      - name: Dry-run full profile
        run: bash install.sh --dry-run --profile full

      - name: Install networking subset
        run: |
          # Install a few fast, universally-available packages to test the real
          # install path including fixup_package_names and pkg_install.
          bash install.sh --tool nmap --tool curl --tool tcpdump --tool socat --tool whois

      - name: Verify networking tools
        run: bash scripts/verify.sh --module networking --installed-only --summary

      - name: Remove networking module
        run: bash scripts/remove.sh --module networking --yes
